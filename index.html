<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>J-HUSH SYSTEM</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #05070f;
  overflow: hidden;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #0a0f1c, #05070f);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px 26px;
  border: none;
  border-radius: 10px;
  background: #1e90ff;
  color: white;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(30,144,255,0.4);
}

/* MAIN */
#main {
  display: none;
  padding: 20px;
  color: white;
}
audio {
  width: 100%;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay">
  <h2>J-HUSH SYSTEM</h2>
  <p>Huy Đức // Audio Interface</p>
  <button onclick="start()">▶ BẬT NHẠC NỀN</button>
</div>

<!-- MAIN -->
<div id="main">
  <h3>TRẠNG THÁI: ONLINE</h3>

  <audio id="bgm" controls loop>
    <!-- MP3 local trong repo -->
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function start(){
  const audio = document.getElementById("bgm");

  audio.volume = 0.3;
  audio.play().catch(()=>{});

  document.getElementById("overlay").style.display = "none";
  document.getElementById("main").style.display = "block";
}
</script>

</body>
</html>
