<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>J-HUSH</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #ffffff, #e9f2ff);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTAINER */
.container {
  text-align: center;
}

/* AVATAR */
.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #4aa3ff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

/* TITLE */
h1 {
  margin-top: 15px;
  font-size: 32px;
  letter-spacing: 4px;
  color: #0a2a4a;
}

h3 {
  margin-top: 5px;
  font-weight: normal;
  color: #3b6ea8;
  letter-spacing: 2px;
}

/* TEXT */
p {
  margin-top: 15px;
  color: #666;
}

/* BUTTON */
button {
  margin-top: 25px;
  padding: 14px 26px;
  border: none;
  border-radius: 12px;
  background: #1e90ff;
  color: white;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(30,144,255,0.3);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* MAIN */
#main {
  display: none;
  text-align: center;
}

audio {
  width: 300px;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="container" id="intro">

  <img src="avatar.png" class="avatar">

  <h1>J-HUSH</h1>
  <h3>HUY ĐỨC</h3>

  <!-- 🔥 ĐÃ SỬA THEO YÊU CẦU -->
  <p>PHÁT NHẠC NỀN</p>

  <button onclick="start()">PHÁT NHẠC NỀN</button>
</div>

<!-- MAIN -->
<div id="main">
  <h2>WELCOME</h2>

  <audio id="bgm" controls loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function start(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";

  const audio = document.getElementById("bgm");
  audio.volume = 0.3;
  audio.play().catch(()=>{});
}
</script>

</body>
</html>
