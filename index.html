<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* Màn hình chào */

#welcome{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    z-index:9999;
}

#welcomeText{
    color:white;
    font-size:32px;
    text-align:center;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{
        opacity:0.5;
        transform:scale(1);
    }

    50%{
        opacity:1;
        transform:scale(1.05);
    }

    100%{
        opacity:0.5;
        transform:scale(1);
    }
}

/* Nội dung website */

#content{
    display:none;
    width:100%;
    height:100vh;
}

/* Thanh nhạc */

#audioBar{
    position:fixed;
    top:10px;
    right:10px;
    z-index:999;
}

audio{
    width:300px;
}

</style>

</head>

<body>

<div id="welcome">
    <div id="welcomeText">
        🎵 NHẤN VÀO TÔI ĐỂ TRUY CẬP WEBSITE 🎵
    </div>
</div>

<div id="content">

```
<div id="audioBar">
    <audio id="music" controls loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>
```

</div>

<script>

const welcome = document.getElementById("welcome");
const content = document.getElementById("content");
const music = document.getElementById("music");

welcome.addEventListener("click", () => {

    welcome.style.display = "none";

    content.style.display = "block";

    music.play();

});

</script>

</body>
</html>
