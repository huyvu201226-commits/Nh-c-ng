<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-HUSH</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #ffffff, #dbeafe);
}

/* CARD */
.card {
  text-align: center;
  width: 260px;
  padding: 18px;
  border-radius: 16px;
  background: rgba(255,255,255,0.7);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* AVATAR NHỎ GỌN */
.avatar {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #4aa3ff;
}

/* TEXT */
h1 {
  margin-top: 8px;
  font-size: 20px;
  letter-spacing: 2px;
  color: #0a2a4a;
}

h3 {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 400;
  color: #3b6ea8;
}

p {
  margin-top: 10px;
  font-size: 12px;
  color: #555;
}

/* BUTTON */
button {
  margin-top: 14px;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: #1e90ff;
  color: white;
  font-size: 13px;
  cursor: pointer;
}

/* MAIN */
#main {
  display: none;
  text-align: center;
  width: 260px;
}

audio {
  width: 100%;
  margin-top: 12px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="card" id="intro">
  <img src="avatar.png" class="avatar">
  <h1>J-HUSH</h1>
  <h3>HUY ĐỨC</h3>
  <p>PHÁT NHẠC NỀN</p>

  <button onclick="startMusic()">PHÁT NHẠC</button>
</div>

<!-- MAIN -->
<div class="card" id="main">
  <h3>WELCOME</h3>

  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function startMusic() {
  const intro = document.getElementById("intro");
  const main = document.getElementById("main");
  const audio = document.getElementById("bgm");

  intro.style.display = "none";
  main.style.display = "block";

  audio.volume = 0.4;

  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(() => {
      console.log("Trình duyệt chặn autoplay");
    });
  }
}
</script>

</body>
</html>
