<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J-HUSH</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at top, #ffffff, #dbeafe);
}

/* GLASS CARD */
.card {
  text-align: center;
  padding: 30px 25px;
  border-radius: 20px;

  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(12px);

  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  width: 320px;
}

/* AVATAR */
.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #4aa3ff;
}

/* TEXT */
h1 {
  margin-top: 12px;
  font-size: 26px;
  letter-spacing: 3px;
  color: #0a2a4a;
}

h3 {
  margin-top: 5px;
  font-weight: 400;
  color: #3b6ea8;
  letter-spacing: 2px;
}

p {
  margin-top: 12px;
  font-size: 14px;
  color: #555;
}

/* BUTTON */
button {
  margin-top: 18px;
  padding: 12px 22px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #1e90ff, #4aa3ff);
  color: white;
  font-size: 14px;
  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;
}

button:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 12px 25px rgba(30,144,255,0.25);
}

button:active {
  transform: scale(0.98);
}

/* MAIN */
#main {
  display: none;
  text-align: center;
}

audio {
  width: 100%;
  margin-top: 20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="card" id="intro">
  <img src="avatar.png" class="avatar">
  <h1>J-HUSH</h1>
  <h3>HUY ĐỨC</h3>
  <p>PHÁT NHẠC NỀN</p>

  <button onclick="startMusic()">PHÁT NHẠC</button>
</div>

<!-- MAIN -->
<div class="card" id="main">
  <h2>WELCOME</h2>

  <audio id="bgm" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function startMusic(){
  const intro = document.getElementById("intro");
  const main = document.getElementById("main");
  const audio = document.getElementById("bgm");

  intro.style.display = "none";
  main.style.display = "block";

  audio.volume = 0.35;

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // fallback: nếu bị chặn autoplay
      console.log("Trình duyệt chặn autoplay");
    });
  }
}
</script>

</body>
</html>
